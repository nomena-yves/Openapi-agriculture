      description: Identifiant du membre
      explode: false
      in: path
      name: membreId
      required: true
      schema:
        type: integer
      style: simple
    ActiviteId:
      description: Identifiant de l'activité
      explode: false
      in: path
      name: activiteId
      required: true
      schema:
        type: integer
      style: simple
    PageParam:
      explode: true
      in: query
      name: page
      required: false
      schema:
        default: 1
        minimum: 1
        type: integer
      style: form
    LimitParam:
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 20
        maximum: 100
        minimum: 1
        type: integer
      style: form
  responses:
    BadRequest:
      content:
        application/json:
          example:
            code: BAD_REQUEST
            message: Les paramètres fournis sont invalides.
          schema:
            $ref: '#/components/schemas/Error'
      description: Requête invalide
    NotFound:
      content:
        application/json:
          example:
            code: NOT_FOUND
            message: La ressource demandée est introuvable.
          schema:
            $ref: '#/components/schemas/Error'
      description: Ressource introuvable
    UnprocessableEntity:
      content:
        application/json:
          example:
            code: UNPROCESSABLE_ENTITY
            message: Conditions métier non remplies.
            details:
            - Le parrain doit avoir plus de 90 jours d'ancienneté.
          schema:
            $ref: '#/components/schemas/Error'
      description: Entité non traitable — règles métier non respectées
  schemas:
    PosteEnum:
      description: Poste d'un membre dans une collectivité ou à la fédération
      enum:
      - president
      - president_adjoint
      - tresorier
      - secretaire
      - membre_confirme
      - membre_junior
      type: string
    ModePaiementEnum:
      enum:
      - espece
      - virement_bancaire
      - mobile_money
      type: string
    TypeCompteEnum:
      enum:
      - caisse
      - bancaire
      - mobile_money
      type: string
    NomBanqueEnum:
      enum:
      - BRED
      - MCB
      - BMOI
      - BOA
      - BGFI
      - AFG
      - ACCES_BANQUE
      - BAOBAB
      - SIPEM
      type: string
    ServiceMobileMoneyEnum:
      enum:
      - Orange_Money
      - Mvola
      - Airtel_Money
      type: string
    TypeActiviteEnum:
      enum:
      - ag_mensuelle
      - formation_juniors
      - exceptionnelle
      - federation
      type: string
    Collectivite:
      example:
        ville: ville
        federation_id: 5
        numero: numero
        specialite: specialite
        id: 5
        nom: nom
        statut: en_attente
        date_creation: 2000-01-23
      properties:
        id:
          readOnly: true
          type: integer
        numero:
          description: Numéro unique de la collectivité
          type: string
        nom:
          description: Nom unique de la collectivité
          type: string
        ville:
          type: string
        specialite:
          description: Spécialité agricole
          type: string
        date_creation:
          format: date
          type: string
        statut:
          enum:
          - en_attente
          - autorisee
          - refusee
          readOnly: true
          type: string
        federation_id:
          readOnly: true
          type: integer
      type: object
    CollectiviteCreate:
      example:
        ville: ville
        numero: numero
        specialite: specialite
        nom: nom
        date_creation: 2000-01-23
      properties:
        numero:
          type: string
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        date_creation:
          format: date
          type: string
      required:
      - date_creation
      - nom
      - numero
      - specialite
      - ville
