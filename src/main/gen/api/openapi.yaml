openapi: 3.0.3
info:
  contact:
    name: Fédération Agricole Madagascar
  description: |
    Spécification OpenAPI pour la digitalisation des processus administratifs de la fédération de collectivités agricoles de Madagascar. Couvre la gestion des collectivités, membres, cotisations, comptes, activités, assiduité et statistiques.
  title: API Fédération de Collectivités Agricoles
  version: 1.0.0
servers:
- description: Serveur de production
  url: https://api.federation-agricole.mg/v1
tags:
- description: Fonctionnalité A — Ouverture et gestion des collectivités
  name: Collectivités
- description: Fonctionnalité B — Admission et gestion des membres
  name: Membres
- description: Fonctionnalité C — Cotisations et paiements
  name: Cotisations
- description: Fonctionnalité D — Comptes et situation de trésorerie
  name: Trésorerie
- description: Fonctionnalité E — Activités des collectivités et de la fédération
  name: Activités
- description: Fonctionnalité F — Suivi de présence des membres
  name: Assiduité
- description: Fonctionnalité G — Rapports et statistiques
  name: Statistiques
paths:
  /collectivites:
    get:
      operationId: listCollectivites
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Filtrer par ville
        explode: true
        in: query
        name: ville
        required: false
        schema:
          type: string
        style: form
      - description: Filtrer par spécialité agricole
        explode: true
        in: query
        name: specialite
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listCollectivites_200_response'
          description: Liste des collectivités
        "400":
          content:
            application/json:
              example:
                code: BAD_REQUEST
                message: Les paramètres fournis sont invalides.
              schema:
                $ref: '#/components/schemas/Error'
          description: Requête invalide
      summary: Lister toutes les collectivités
      tags:
      - Collectivités
      x-accepts:
      - application/json
    post:
      description: |
        Soumet une demande d'ouverture. La fédération doit ensuite accorder l'autorisation formelle via PATCH /collectivites/{id}/autorisation. Conditions : au moins 10 membres avec 6 mois d'ancienneté, postes spécifiques pourvus.
      operationId: createCollectivite
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreate'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
          description: Demande d'ouverture créée
        "400":
          content:
            application/json:
              example:
                code: BAD_REQUEST
                message: Les paramètres fournis sont invalides.
              schema:
                $ref: '#/components/schemas/Error'
          description: Requête invalide
        "422":
          content:
            application/json:
              example:
                code: UNPROCESSABLE_ENTITY
                message: Conditions métier non remplies.
                details:
                - Le parrain doit avoir plus de 90 jours d'ancienneté.
              schema:
                $ref: '#/components/schemas/Error'
          description: Entité non traitable — règles métier non respectées
      summary: Demander l'ouverture d'une nouvelle collectivité
      tags:
      - Collectivités
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}:
    get:
      operationId: getCollectivite
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
          description: Détail d'une collectivité
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Obtenir une collectivité
      tags:
      - Collectivités
      x-accepts:
      - application/json
    patch:
      operationId: updateCollectivite
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteUpdate'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
          description: Collectivité mise à jour
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Mettre à jour une collectivité
      tags:
      - Collectivités
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/autorisation:
    patch:
      operationId: setAutorisationCollectivite
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setAutorisationCollectivite_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
          description: Statut d'autorisation mis à jour
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Accorder ou refuser l'autorisation d'ouverture
      tags:
      - Collectivités
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/membres:
    get:
      operationId: listMembres
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Filtrer par statut
        explode: true
        in: query
        name: statut
        required: false
        schema:
          enum:
          - actif
          - demissionne
          type: string
        style: form
      - explode: true
        in: query
        name: poste
        required: false
        schema:
          $ref: '#/components/schemas/PosteEnum'
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listMembres_200_response'
          description: Liste des membres
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Lister les membres d'une collectivité
      tags:
      - Membres
      x-accepts:
      - application/json
    post:
      description: |
        Conditions : parrainage par un membre confirmé avec plus de 90 jours d'ancienneté, informations personnelles complètes, frais d'adhésion de 50 000 MGA réglés.
      operationId: admettreMembreCollectivite
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreAdmission'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Membre admis
        "400":
          content:
            application/json:
              example:
                code: BAD_REQUEST
                message: Les paramètres fournis sont invalides.
              schema:
                $ref: '#/components/schemas/Error'
          description: Requête invalide
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
        "422":
          content:
            application/json:
              example:
                code: UNPROCESSABLE_ENTITY
                message: Conditions métier non remplies.
                details:
                - Le parrain doit avoir plus de 90 jours d'ancienneté.
              schema:
                $ref: '#/components/schemas/Error'
          description: Entité non traitable — règles métier non respectées
      summary: Admettre un nouveau membre dans une collectivité
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/membres/{membreId}:
    get:
      operationId: getMembre
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - description: Identifiant du membre
        explode: false
        in: path
        name: membreId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Détail d'un membre
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Obtenir un membre
      tags:
      - Membres
      x-accepts:
      - application/json
    patch:
      operationId: updateMembre
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - description: Identifiant du membre
        explode: false
        in: path
        name: membreId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreUpdate'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Membre mis à jour
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Mettre à jour les informations d'un membre
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/membres/{membreId}/transfert:
    post:
      operationId: transfererMembre
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - description: Identifiant du membre
        explode: false
        in: path
        name: membreId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/transfererMembre_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Transfert effectué
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
        "422":
          content:
            application/json:
              example:
                code: UNPROCESSABLE_ENTITY
                message: Conditions métier non remplies.
                details:
                - Le parrain doit avoir plus de 90 jours d'ancienneté.
              schema:
                $ref: '#/components/schemas/Error'
          description: Entité non traitable — règles métier non respectées
      summary: Transférer un membre vers une autre collectivité
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/membres/{membreId}/demission:
    post:
      operationId: demissionMembre
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - description: Identifiant du membre
        explode: false
        in: path
        name: membreId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/demissionMembre_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
          description: Démission enregistrée
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Enregistrer la démission d'un membre
      tags:
      - Membres
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/cotisations:
    get:
      operationId: listCotisations
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: membre_id
        required: false
        schema:
          type: integer
        style: form
      - explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - mensuelle
          - annuelle
          - ponctuelle
          type: string
        style: form
      - explode: true
        in: query
        name: date_debut
        required: false
        schema:
          format: date
          type: string
        style: form
      - explode: true
        in: query
        name: date_fin
        required: false
        schema:
          format: date
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listCotisations_200_response'
          description: Liste des cotisations
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Lister les cotisations d'une collectivité
      tags:
      - Cotisations
      x-accepts:
      - application/json
    post:
      operationId: createCotisation
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotisationCreate'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
          description: Cotisation créée
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
        "422":
          content:
            application/json:
              example:
                code: UNPROCESSABLE_ENTITY
                message: Conditions métier non remplies.
                details:
                - Le parrain doit avoir plus de 90 jours d'ancienneté.
              schema:
                $ref: '#/components/schemas/Error'
          description: Entité non traitable — règles métier non respectées
      summary: Créer une cotisation
      tags:
      - Cotisations
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/cotisations/{cotisationId}/encaissements:
    get:
      operationId: listEncaissements
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - explode: false
        in: path
        name: cotisationId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Encaissement'
                type: array
          description: Liste des encaissements
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Lister les encaissements d'une cotisation
      tags:
      - Cotisations
      x-accepts:
      - application/json
    post:
      description: Le trésorier enregistre un paiement reçu pour une cotisation.
      operationId: createEncaissement
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - explode: false
        in: path
        name: cotisationId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncaissementCreate'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encaissement'
          description: Encaissement enregistré
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
        "422":
          content:
            application/json:
              example:
                code: UNPROCESSABLE_ENTITY
                message: Conditions métier non remplies.
                details:
                - Le parrain doit avoir plus de 90 jours d'ancienneté.
              schema:
                $ref: '#/components/schemas/Error'
          description: Entité non traitable — règles métier non respectées
      summary: Enregistrer un encaissement
      tags:
      - Cotisations
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/comptes:
    get:
      operationId: listComptes
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - caisse
          - bancaire
          - mobile_money
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Compte'
                type: array
          description: Liste des comptes
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
      summary: Lister les comptes d'une collectivité
      tags:
      - Trésorerie
      x-accepts:
      - application/json
    post:
      description: |
        Une collectivité ne peut avoir qu'une seule caisse. Plusieurs comptes bancaires et mobile money sont autorisés.
      operationId: createCompte
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteCreate'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
          description: Compte créé
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
        "422":
          content:
            application/json:
              example:
                code: UNPROCESSABLE_ENTITY
                message: Conditions métier non remplies.
                details:
                - Le parrain doit avoir plus de 90 jours d'ancienneté.
              schema:
                $ref: '#/components/schemas/Error'
          description: Entité non traitable — règles métier non respectées
      summary: Créer un compte
      tags:
      - Trésorerie
      x-content-type: application/json
      x-accepts:
      - application/json
  /collectivites/{collectiviteId}/comptes/{compteId}:
    delete:
      operationId: deleteCompte
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - explode: false
        in: path
        name: compteId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "204":
          description: Compte supprimé
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
          description: Ressource introuvable
        "422":
          content:
            application/json:
              example:
                code: UNPROCESSABLE_ENTITY
                message: Conditions métier non remplies.
                details:
                - Le parrain doit avoir plus de 90 jours d'ancienneté.
              schema:
                $ref: '#/components/schemas/Error'
          description: Entité non traitable — règles métier non respectées
      summary: Supprimer un compte
      tags:
      - Trésorerie
      x-accepts:
      - application/json
    get:
      operationId: getCompte
      parameters:
      - description: Identifiant de la collectivité
        explode: false
        in: path
        name: collectiviteId
        required: true
        schema:
          type: integer
        style: simple
      - explode: false
        in: path
        name: compteId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
          description: Détail du compte avec solde
        "404":
          content:
            application/json:
              example:
                code: NOT_FOUND
                message: La ressource demandée est introuvable.
              schema:
                $ref: '#/components/schemas/Error'
