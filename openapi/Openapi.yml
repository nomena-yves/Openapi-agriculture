openapi: 3.1.0
info:
  version: 1.0.0
  title: fédération et collectivité agricole
  description: digitalisation dans le domaine agricole
servers:
  - url: http://localhost/8080

paths:
  '/collectivite':
    post:
      summary: création d'une colléctivité agricole
      requestBody:
        required: true
        content:
          application/json:
            schema:
             $ref: '#/components/schemas/CollectiviteAgricole'



components:
  schemas:
    membre:
      type: object
      properties:
        id:
          type: intteger
        nomNrenom:
          type: string
        dateNaissance:
          type: date-time
        adress:
          type: string
        métier-exercer:
          type: string
        telephone:
          type: string
        adressEmail:
          type: string
        dateAdhésion:
          type: date-time
        poste:
          type: string
          enum:
            - président
            - président adjoin
            - trésorier
            - secrétaire
            - membre confirmé
            - membre junior
      examples:
        exemplePresident:
          summary: Exemple d’un président
          value:
            id: 1
            nomPrenom: "Rakoto Jean"
            dateNaissance: "1980-03-15"
            adresse: "Lot II 45B, Antananarivo"
            metierExerce: "Agriculteur rizicole"
            telephone: "+261341234567"
            adresseEmail: "rakoto.jean@example.com"
            dateAdhesion: "2023-06-01"
            poste: "president"

    CollectiviteAgricole:
      type: object
      properties:
        id:
          type: integer

        nom:
          type: string

        specialite:
          type: string

        date_creation:
          type: string
          format: date-time

        membres:
          type: array
          items:
      examples:
        exempleCollectivité:
          id: 3
          nom: "Coopérative Rizicole d'Ambatondrazaka"
          specialite: "Culture du riz"
          date_creation: "2015-03-10T00:00:00Z"
          membres:
            $ref: '#/components/schemas/membre'
